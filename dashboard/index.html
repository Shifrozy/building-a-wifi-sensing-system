<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WiFi Sense 3D Radar — Real-time human detection through WiFi signals">
    <title>WiFi Sense — 3D Radar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📡</text></svg>">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <!-- 3D Canvas -->
    <canvas id="radar-canvas"></canvas>

    <!-- Top HUD Bar -->
    <header class="hud-header" id="hud-header">
        <div class="hud-left">
            <div class="hud-logo">
                <div class="radar-icon-mini">
                    <div class="sweep-mini"></div>
                </div>
                <div class="hud-title">
                    <h1>WIFI SENSE</h1>
                    <span>3D RADAR SYSTEM</span>
                </div>
            </div>
        </div>
        <div class="hud-center">
            <div class="hud-stat" id="stat-status">
                <div class="stat-indicator" id="detection-indicator"></div>
                <div class="stat-text">
                    <span class="stat-label">STATUS</span>
                    <span class="stat-value" id="status-text">INITIALIZING</span>
                </div>
            </div>
            <div class="hud-stat">
                <span class="stat-label">INTENSITY</span>
                <div class="intensity-bar">
                    <div class="intensity-fill" id="intensity-fill"></div>
                </div>
                <span class="stat-value-sm" id="intensity-value">0%</span>
            </div>
            <div class="hud-stat">
                <span class="stat-label">CONFIDENCE</span>
                <span class="stat-value" id="confidence-text">—</span>
            </div>
            <div class="hud-stat">
                <span class="stat-label">NETWORKS</span>
                <span class="stat-value" id="networks-text">0</span>
            </div>
        </div>
        <div class="hud-right">
            <div class="hud-connection" id="connection-status">
                <div class="conn-dot"></div>
                <span>CONNECTING</span>
            </div>
        </div>
    </header>

    <!-- Left Panel — Signal Monitor -->
    <aside class="side-panel left-panel" id="signal-panel">
        <div class="panel-header">
            <h3>📶 SIGNAL MONITOR</h3>
            <span class="panel-badge" id="ap-count">0 APs</span>
        </div>
        <div class="signal-list" id="signal-list">
            <!-- Dynamic signal items -->
        </div>
    </aside>

    <!-- Right Panel — Detection Log -->
    <aside class="side-panel right-panel" id="detection-panel">
        <div class="panel-header">
            <h3>👤 DETECTION LOG</h3>
        </div>
        <div class="detection-log" id="detection-log">
            <div class="log-entry system">
                <span class="log-time">--:--:--</span>
                <span class="log-msg">System starting...</span>
            </div>
        </div>
        <div class="panel-divider"></div>
        <div class="panel-header">
            <h3>📊 POSITION</h3>
        </div>
        <div class="position-display">
            <div class="mini-radar" id="mini-radar">
                <div class="mini-radar-dot" id="mini-radar-dot"></div>
                <div class="mini-radar-cross"></div>
            </div>
            <div class="position-coords">
                <div><span class="coord-label">X:</span> <span id="pos-x">0.00</span></div>
                <div><span class="coord-label">Z:</span> <span id="pos-z">0.00</span></div>
            </div>
        </div>
    </aside>

    <!-- Bottom HUD — Controls -->
    <footer class="hud-footer" id="hud-footer">
        <div class="footer-left">
            <button class="hud-btn" id="btn-reset" title="Reset Baseline">
                🔄 RESET
            </button>
            <button class="hud-btn" id="btn-toggle-waves" title="Toggle Waves">
                🌊 WAVES
            </button>
            <button class="hud-btn" id="btn-toggle-grid" title="Toggle Grid">
                ⊞ GRID
            </button>
        </div>
        <div class="footer-center">
            <span class="scan-counter">SCAN #<span id="scan-count">0</span></span>
            <span class="baseline-status" id="baseline-status">⏳ COLLECTING BASELINE...</span>
        </div>
        <div class="footer-right">
            <span class="fps-counter" id="fps-counter">60 FPS</span>
        </div>
    </footer>

    <!-- Fullscreen alert when person detected -->
    <div class="detection-alert" id="detection-alert">
        <div class="alert-pulse"></div>
        <span>👤 PERSON DETECTED</span>
    </div>

    <script src="app.js"></script>
</body>
</html>
